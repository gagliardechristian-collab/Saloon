<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saloon ERP – Gold Rush Edition</title>
<style>
/* --- MODERNER WILD-WEST-LOOK --- */
:root {
  --wood-dark: #2b1d0e;
  --wood-medium: #3a2715;
  --wood-light: #5a3b1f;
  --gold: #d7a85b;
  --paper: #f5e6c8;
  --danger: #b54a3a;
  --success: #2ecc71;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: var(--wood-dark);
  color: var(--paper);
  margin: 0;
  padding: 20px;
  line-height: 1.4;
}

/* Header Bereich */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  background: rgba(0,0,0,0.3);
  border-bottom: 2px solid var(--gold);
  margin-bottom: 25px;
  border-radius: 8px;
}

h1 { margin: 0; font-variant: small-caps; color: var(--gold); }

/* Das Grid-System für bessere Übersicht */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr; /* 4 Spalten Layout wie gewünscht */
  gap: 20px;
}

@media (max-width: 1400px) { .container { grid-template-columns: 1fr 1fr; } }
@media (max-width: 800px) { .container { grid-template-columns: 1fr; } }

.panel {
  background: var(--wood-medium);
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  border-top: 3px solid var(--gold);
  height: fit-content;
}

.panel h2, .panel h3 {
  margin-top: 0;
  color: var(--gold);
  border-bottom: 1px solid var(--wood-light);
  padding-bottom: 8px;
  text-transform: uppercase;
  font-size: 1.1rem;
}

/* Listen Ansicht für Verkäufe */
.table-wrapper {
  max-height: 350px;
  overflow-y: auto;
  background: rgba(0,0,0,0.2);
  border-radius: 6px;
  margin: 10px 0;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
}

th {
  background: var(--wood-light);
  padding: 10px;
  text-align: left;
  position: sticky;
  top: 0;
}

td {
  padding: 8px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* Artikel Kacheln */
#itemsList button {
  background: var(--wood-light);
  color: var(--paper);
  border: 1px solid var(--gold);
  margin: 4px 0;
  padding: 12px;
  text-align: left;
  display: flex;
  justify-content: space-between;
  transition: all 0.2s;
}

#itemsList button:hover:not(:disabled) {
  background: var(--gold);
  color: var(--wood-dark);
}

/* Formulare & Inputs */
input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: 1px solid var(--wood-light);
  background: #1a1108;
  color: white;
  box-sizing: border-box;
}

button {
  background: var(--gold);
  color: var(--wood-dark);
  border: none;
  padding: 12px;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  text-transform: uppercase;
}

button:hover { opacity: 0.9; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

.dangerbtn { background: var(--danger) !important; color: white !important; }
.topbtn { width: auto; padding: 10px 20px; }

.page { display: none; }
.page.active { display: block; }

.bank-big {
  font-size: 2.5rem;
  color: var(--success);
  text-align: center;
  font-weight: bold;
  margin: 10px 0;
}
</style>
</head>
<body>

<div class="topbar">
  <h1>🤠 Saloon ERP</h1>
  <div class="top-actions">
    <div id="userBadge" style="background: var(--wood-light); padding: 8px 15px; border-radius: 20px; font-size: 14px; border: 1px solid var(--gold);">
      👤 <span id="activeUserBadge">Niemand</span>
    </div>
    <button class="topbtn" id="employeePageBtn" onclick="showPage('employee')">Verwaltung & Login</button>
    <button class="topbtn" style="background:var(--wood-light); color:white; display:none;" id="cashPageBtn" onclick="showPage('cash')">Zur Kasse</button>
  </div>
</div>

<div id="cashPage" class="page active">
  <div class="container">
    
    <div class="panel">
      <h2>Inventar</h2>
      <div id="itemsList"></div>
      <div class="notice" id="stockNotice"></div>
    </div>

    <div class="panel">
      <h2>Aktuelle Session</h2>
      <div class="table-wrapper">
        <table id="cartTable"></table>
      </div>
      <div style="font-size: 1.2rem; margin: 15px 0; text-align: right;">Total: <strong>$<span id="sessionTotal">0.00</span></strong></div>
      <button onclick="addSessionToBank()" style="width: 100%; font-size: 1.1rem; margin-bottom: 10px;">💰 Umsatz Buchen</button>
      <button class="dangerbtn" onclick="clearSession()" style="width: 100%; font-size: 0.8rem;">Session Löschen</button>
      <div class="notice" id="salesNotice"></div>
      
      <hr style="margin: 25px 0; border: 0; border-top: 1px solid var(--gold);">
      
      <h2>Kassenstand</h2>
      <div class="bank-big">$ <span id="bankDisplay">0.00</span></div>
      <input type="number" id="bank" onchange="saveBank()" placeholder="Manueller Kassenstand">
    </div>

    <div class="panel" style="grid-column: span 2;">
      <h2>Verkaufshistorie</h2>
      <div class="table-wrapper" style="max-height: 500px;">
        <table id="salesHistoryTable"></table>
      </div>
      <button class="dangerbtn" onclick="clearSalesHistory()" style="width: auto; padding: 5px 15px; font-size: 12px;">Historie leeren</button>
      <div class="notice" id="salesHistoryNotice"></div>
      
      <h2 style="margin-top: 30px;">Mitarbeiter Ranking</h2>
      <div class="table-wrapper">
         <table id="cashSalesOverviewTable"></table>
      </div>
    </div>

  </div>
</div>

<div id="employeePage" class="page">
  <div class="container">
    <div class="panel">
      <h2>Mitarbeiter Login</h2>
      <input id="newUserName" type="text" placeholder="Neuer Mitarbeiter Name">
      <button onclick="addUser()" style="width: 100%;">Anlegen</button>
      <hr>
      <select id="activeUserSelect"></select>
      <button onclick="setActiveUser()" style="width: 100%;">Als aktiver Nutzer einloggen</button>
      <div style="margin-top: 15px; text-align: center;">Aktiv: <strong id="activeUserLabel">Niemand</strong></div>
    </div>

    <div class="panel">
      <h2>Neuer Artikel</h2>
      <input id="newName" placeholder="Name">
      <input id="newPrice" type="number" placeholder="Verkaufspreis $">
      <input id="newCost" type="number" placeholder="Einkaufspreis $">
      <input id="newStock" type="number" placeholder="Anfangsbestand">
      <select id="newCategory"></select>
      <button onclick="addNewProduct()" style="width: 100%;">Produkt Speichern</button>
    </div>

    <div class="panel" style="grid-column: span 2;">
      <h2>Lagerverwaltung</h2>
      <div class="table-wrapper">
        <table id="editProductsTable"></table>
      </div>
    </div>
  </div>
</div>
