<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Saloon Reset System</title>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = "https://pdknntkktmghxcfvjuom.supabase.co/";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBka25udGtrdG1naHhjZnZqdW9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NzE2OTgsImV4cCI6MjA4OTE0NzY5OH0.5AyOTZKigcOL4aaObgP7tRwoN4OSHqPsWMaW1A6VMm0";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 🔥 Komplett Reset (behält Mitarbeiter)
async function fullResetKeepEmployees(){
  if(!confirm("ALLES löschen außer Mitarbeiter?")) return;

  await supabase.from("sales").delete().neq("id", "");
  await supabase.from("products").delete().neq("id", "");

  await supabase.from("settings").upsert([
    { key: "purchase_history", value: { items: [] } },
    { key: "hidden_sales_history_ids", value: { items: [] } },
    { key: "bank_total", value: { amount: 0 } }
  ]);

  alert("Reset fertig. Mitarbeiter bleiben erhalten.");
}
window.fullResetKeepEmployees = fullResetKeepEmployees;

// ⚡ Nur Verkäufe zurücksetzen
async function resetSalesOnly(){
  if(!confirm("Nur Verkäufe löschen?")) return;

  await supabase.from("sales").delete().neq("id", "");

  alert("Alle Verkäufe gelöscht.");
}
window.resetSalesOnly = resetSalesOnly;

// 📦 Produkte löschen
async function resetProducts(){
  if(!confirm("Alle Produkte löschen?")) return;

  await supabase.from("products").delete().neq("id", "");

  alert("Alle Produkte gelöscht.");
}
window.resetProducts = resetProducts;

// 💰 Kasse resetten
async function resetBank(){
  if(!confirm("Kasse auf 0 setzen?")) return;

  await supabase.from("settings").upsert({
    key: "bank_total",
    value: { amount: 0 }
  });

  alert("Kasse zurückgesetzt.");
}
window.resetBank = resetBank;

// 🧾 Einkaufshistorie löschen
async function resetPurchases(){
  if(!confirm("Einkaufshistorie löschen?")) return;

  await supabase.from("settings").upsert({
    key: "purchase_history",
    value: { items: [] }
  });

  alert("Einkäufe gelöscht.");
}
window.resetPurchases = resetPurchases;

// 🧹 Anzeige-Historie resetten
async function resetVisibleHistory(){
  if(!confirm("Nur Anzeige-Historie löschen?")) return;

  await supabase.from("settings").upsert({
    key: "hidden_sales_history_ids",
    value: { items: [] }
  });

  alert("Historie zurückgesetzt.");
}
window.resetVisibleHistory = resetVisibleHistory;

</script>

<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  padding:40px;
}
button{
  display:block;
  margin:10px 0;
  padding:12px;
  width:320px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}
.danger{background:#e74c3c}
.safe{background:#2ecc71}
</style>
</head>
<body>

<h1>🔥 Datenbank Reset Panel</h1>

<button class="danger" onclick="fullResetKeepEmployees()">
  KOMPLETT RESET (ohne Mitarbeiter)
</button>

<button class="danger" onclick="resetSalesOnly()">
  Nur Verkäufe löschen
</button>

<button class="danger" onclick="resetProducts()">
  Nur Produkte löschen
</button>

<button class="danger" onclick="resetPurchases()">
  Einkaufshistorie löschen
</button>

<button class="danger" onclick="resetVisibleHistory()">
  Anzeige-Historie resetten
</button>

<button class="safe" onclick="resetBank()">
  Kasse auf 0 setzen
</button>

</body>
</html>
